<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap 4 Modals Demo</title>
  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="p-4">

  <h2>Bootstrap 4 Modals Examples</h2>

  <!-- Buttons to trigger modals -->
  <button type="button" class="btn btn-primary mb-2" data-toggle="modal" data-target="#basicModal">Basic Modal</button>
  <button type="button" class="btn btn-success mb-2" data-toggle="modal" data-target="#smallModal">Small Modal</button>
  <button type="button" class="btn btn-info mb-2" data-toggle="modal" data-target="#largeModal">Large Modal</button>
  <button type="button" class="btn btn-warning mb-2" data-toggle="modal" data-target="#xlModal">Extra Large Modal</button>
  <button type="button" class="btn btn-dark mb-2" data-toggle="modal" data-target="#centeredModal">Centered Modal</button>
  <button type="button" class="btn btn-danger mb-2" data-toggle="modal" data-target="#scrollModal">Scrolling Modal</button>

  <!-- Basic Modal with animation -->
  <div class="modal fade" id="basicModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Basic Modal</h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">
          This is a basic modal with fade animation.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Small Modal -->
  <div class="modal fade" id="smallModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-sm" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Small Modal</h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">This is a small modal.</div>
      </div>
    </div>
  </div>

  <!-- Large Modal -->
  <div class="modal fade" id="largeModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Large Modal</h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">This is a large modal.</div>
      </div>
    </div>
  </div>

  <!-- Extra Large Modal -->
  <div class="modal fade" id="xlModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-xl" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Extra Large Modal</h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">This is an extra large modal.</div>
      </div>
    </div>
  </div>

  <!-- Centered Modal -->
  <div class="modal fade" id="centeredModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Centered Modal</h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">This modal is vertically
